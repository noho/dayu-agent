name: Release Offline Bundles

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-wheel:
    name: build-wheel (py3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build --wheel

      - name: Resolve wheel path
        shell: bash
        run: |
          WHEEL_PATH="$(python - <<'PY'
          from pathlib import Path
          wheels = sorted(Path("dist").glob("dayu_agent-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"unexpected wheels: {wheels}")
          print(wheels[0])
          PY
          )"
          echo "WHEEL_PATH=$WHEEL_PATH" >> "$GITHUB_ENV"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dayu-wheel
          path: ${{ env.WHEEL_PATH }}

      - name: Upload wheel release asset
        if: github.event_name == 'release'
        # v2
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: ${{ env.WHEEL_PATH }}

  build-offline:
    name: build-offline (${{ matrix.platform_id }}, py3.11)
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform_id: macos-arm64
          - runner: ubuntu-latest
            platform_id: linux-x64
          - runner: windows-latest
            platform_id: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install locked dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          CONSTRAINTS="constraints/lock-${{ matrix.platform_id }}-py311.txt"
          pip install -e ".[test,dev,browser]" -c "$CONSTRAINTS"

      - name: Build wheel
        run: python -m pip wheel --no-deps --wheel-dir dist .

      - name: Build offline bundle
        shell: bash
        run: |
          CONSTRAINTS="constraints/lock-${{ matrix.platform_id }}-py311.txt"
          WHEEL_PATH="$(python - <<'PY'
          from pathlib import Path
          wheels = sorted(Path("dist").glob("dayu_agent-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"unexpected wheels: {wheels}")
          print(wheels[0])
          PY
          )"
          BUNDLE_PATH="$(python utils/build_offline_bundle.py \
            --wheel "$WHEEL_PATH" \
            --constraints "$CONSTRAINTS" \
            --platform-id "${{ matrix.platform_id }}" \
            --output-dir dist/offline)"
          echo "BUNDLE_PATH=$BUNDLE_PATH" >> "$GITHUB_ENV"

      - name: Smoke test offline bundle
        run: python utils/smoke_test_offline_bundle.py --archive "${{ env.BUNDLE_PATH }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: offline-${{ matrix.platform_id }}
          path: ${{ env.BUNDLE_PATH }}

      - name: Upload release asset
        if: github.event_name == 'release'
        # v2
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: ${{ env.BUNDLE_PATH }}
